<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — TCC Tech Bingo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f23;
      color: #e8e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .box {
      background: #1c1c3a;
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 360px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }
    h1 { font-size: 1.6rem; color: #9BB6BF; }
    p  { color: #666; font-size: 0.9rem; line-height: 1.5; }
    input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      background: #0f0f23;
      border: 2px solid #2a2a50;
      border-radius: 10px;
      color: #e8e8f0;
      font-size: 1rem;
      outline: none;
    }
    input[type="password"]:focus { border-color: #9BB6BF; }
    button {
      width: 100%;
      padding: 13px;
      background: #c0392b;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover { background: #e74c3c; }
    #msg { font-size: 0.95rem; min-height: 1.4em; }
    #msg.success { color: #2ecc71; }
    #msg.error   { color: #e74c3c; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Admin</h1>
    <p>Reset all scores at the start of a new weekend. This clears the scoreboard for everyone.</p>
    <input type="password" id="pw" placeholder="Admin password">
    <button onclick="doReset()">Reset Scores</button>
    <div id="msg"></div>
  </div>
  <script>
    document.getElementById('pw').addEventListener('keydown', e => {
      if (e.key === 'Enter') doReset();
    });
    async function doReset() {
      const pw = document.getElementById('pw').value;
      const msg = document.getElementById('msg');
      msg.textContent = 'Resetting…';
      msg.className = '';
      try {
        const res = await fetch('/admin/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw })
        });
        const data = await res.json();
        if (data.ok) {
          msg.textContent = '✅ Scores reset! Everyone starts fresh.';
          msg.className = 'success';
          document.getElementById('pw').value = '';
        } else {
          msg.textContent = '❌ ' + data.error;
          msg.className = 'error';
        }
      } catch {
        msg.textContent = '❌ Could not connect to server.';
        msg.className = 'error';
      }
    }
  </script>
</body>
</html>
