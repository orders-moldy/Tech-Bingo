<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0c0c1e">
  <title>Admin — TCC Tech Bingo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c1e;
      --surface: #191936;
      --line: rgba(155, 182, 191, 0.12);
      --accent: #9BB6BF;
      --accent-bright: #c6dde5;
      --text: #eef0f6;
      --muted: #8e90ad;
    }

    body {
      font-family: 'Outfit', system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(1000px 600px at 85% -10%, rgba(155, 182, 191, 0.09), transparent 60%),
        radial-gradient(900px 700px at -10% 100%, rgba(90, 110, 200, 0.10), transparent 60%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }

    .box {
      background: linear-gradient(180deg, rgba(32, 32, 74, 0.9), rgba(25, 25, 54, 0.9));
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.45), inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(155, 182, 191, 0.35);
    }
    p { color: var(--muted); font-size: 0.9rem; line-height: 1.5; }

    input[type="password"] {
      width: 100%;
      padding: 14px 16px;
      background: rgba(12, 12, 30, 0.7);
      border: 1.5px solid var(--line);
      border-radius: 14px;
      color: var(--text);
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(155, 182, 191, 0.15);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: filter 0.15s, transform 0.12s;
    }
    button:hover  { filter: brightness(1.1); }
    button:active { transform: scale(0.97); }

    #unlock-btn {
      background: linear-gradient(180deg, var(--accent-bright), var(--accent));
      color: var(--bg);
      box-shadow: 0 4px 18px rgba(155, 182, 191, 0.25);
    }

    #suspend-btn {
      background: linear-gradient(180deg, #3a80c9, #2a6099);
      color: #fff;
    }
    #suspend-btn.active {
      background: linear-gradient(180deg, #5abf80, #4a9e6a);
    }

    #reset-btn {
      background: linear-gradient(180deg, #e74c3c, #c0392b);
      color: #fff;
    }

    #msg { font-size: 0.95rem; min-height: 1.4em; }
    #msg.success { color: #2ecc71; }
    #msg.error   { color: #e74c3c; }

    #actions { display: none; flex-direction: column; gap: 10px; }
    #actions.visible { display: flex; }

    .action-hint {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
    }
    .divider { border-top: 1px solid var(--line); margin: 4px 0; }
    .hidden { display: none !important; }

    #history-btn {
      background: linear-gradient(180deg, #8a7bc9, #6a5ba9);
      color: #fff;
    }

    /* History panel */
    #history {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 50vh;
      overflow-y: auto;
      padding-right: 4px;
    }
    .hist-section-title {
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--accent);
    }
    .hist-champ {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(12, 12, 30, 0.55);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .hist-champ-rank { font-size: 1.1rem; flex-shrink: 0; width: 26px; text-align: center; }
    .hist-champ-info { flex: 1; min-width: 0; }
    .hist-champ-name {
      font-size: 0.9rem;
      font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .hist-champ-sub { font-size: 0.72rem; color: var(--muted); }
    .hist-champ-wins {
      font-size: 1.2rem;
      font-weight: 900;
      color: var(--accent);
      flex-shrink: 0;
    }
    .hist-weekend {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 2px;
      border-bottom: 1px solid var(--line);
      font-size: 0.85rem;
    }
    .hist-weekend:last-child { border-bottom: none; }
    .hist-weekend-date { color: var(--muted); font-size: 0.75rem; flex-shrink: 0; }
    .hist-weekend-winner { flex: 1; min-width: 0; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hist-weekend-wins { color: var(--accent); font-weight: 800; flex-shrink: 0; }
    .hist-empty { color: var(--muted); font-size: 0.85rem; font-style: italic; text-align: center; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Admin</h1>
    <p id="intro-text">Enter the admin password to manage the game.</p>
    <input type="password" id="pw" placeholder="Admin password" autocomplete="current-password">
    <button id="unlock-btn" onclick="doUnlock()">Unlock</button>

    <div id="actions">
      <div class="divider"></div>

      <button id="suspend-btn" onclick="doSuspend()">📊 Show Stats Screen</button>
      <p class="action-hint" id="suspend-hint">Pauses play and shows the leaderboard &amp; most-marked tiles on all screens.</p>

      <div class="divider"></div>

      <button id="reset-btn" onclick="doReset()">🗑️ Reset Scores</button>
      <p class="action-hint">Archives the weekend scoreboard and sends a summary email. Past weekends stay in Win History.</p>

      <div class="divider"></div>

      <button id="history-btn" onclick="toggleHistory()">📜 Win History</button>
      <p class="action-hint">All-time champions and past weekend winners.</p>

      <div id="history" class="hidden"></div>
    </div>

    <div id="msg"></div>
  </div>

  <script>
    let adminPw = '';
    let isSuspended = false;

    const $ = id => document.getElementById(id);
    const setMsg = (text, cls = '') => { $('msg').textContent = text; $('msg').className = cls; };

    $('pw').addEventListener('keydown', e => { if (e.key === 'Enter') doUnlock(); });

    // Verify the password with the server before revealing any controls
    async function doUnlock() {
      const pw = $('pw').value;
      if (!pw) return;
      setMsg('Checking…');
      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw })
        });
        const data = await res.json();
        if (!data.ok) {
          setMsg('❌ ' + (data.error || 'Wrong password'), 'error');
          return;
        }
        adminPw = pw;
        isSuspended = data.suspended;
        $('pw').style.display = 'none';
        $('unlock-btn').style.display = 'none';
        $('intro-text').style.display = 'none';
        $('actions').classList.add('visible');
        updateSuspendBtn();
        setMsg('');
      } catch {
        setMsg('❌ Could not connect to server.', 'error');
      }
    }

    function updateSuspendBtn() {
      const btn = $('suspend-btn');
      if (isSuspended) {
        btn.textContent = '▶️ Resume Play';
        btn.classList.add('active');
        $('suspend-hint').textContent = 'Resumes the game and hides the stats screen for all players.';
      } else {
        btn.textContent = '📊 Show Stats Screen';
        btn.classList.remove('active');
        $('suspend-hint').textContent = 'Pauses play and shows the leaderboard & most-marked tiles on all screens.';
      }
    }

    async function doSuspend() {
      setMsg(isSuspended ? 'Resuming…' : 'Suspending…');
      try {
        const res = await fetch('/admin/suspend', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: adminPw, active: isSuspended }) // active:true = resume
        });
        const data = await res.json();
        if (data.ok) {
          isSuspended = data.suspended;
          updateSuspendBtn();
          setMsg(isSuspended ? '✅ Stats screen shown to all players.' : '✅ Play resumed.', 'success');
        } else {
          setMsg('❌ ' + (data.error || 'Failed'), 'error');
        }
      } catch {
        setMsg('❌ Could not connect to server.', 'error');
      }
    }

    // Escape user names before inserting into innerHTML
    const esc = s => String(s).replace(/[&<>"']/g, c =>
      ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));

    async function toggleHistory() {
      const panel = $('history');
      if (!panel.classList.contains('hidden')) {
        panel.classList.add('hidden');
        return;
      }
      setMsg('Loading history…');
      try {
        const res = await fetch('/admin/history', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: adminPw })
        });
        const data = await res.json();
        if (!data.ok) { setMsg('❌ ' + (data.error || 'Failed'), 'error'); return; }
        renderHistory(data);
        panel.classList.remove('hidden');
        setMsg('');
      } catch {
        setMsg('❌ Could not connect to server.', 'error');
      }
    }

    function fmtWeekend(iso) {
      if (!iso || iso === 'unknown') return 'Unknown weekend';
      const d = new Date(iso + 'T12:00:00');
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    function renderHistory({ weekends, allTime }) {
      const panel = $('history');
      if (!weekends.length) {
        panel.innerHTML = '<p class="hist-empty">No wins recorded yet.</p>';
        return;
      }

      const medals = ['🥇', '🥈', '🥉'];
      const champs = allTime.slice(0, 5).map((p, i) => `
        <div class="hist-champ">
          <div class="hist-champ-rank">${medals[i] ?? `${i + 1}.`}</div>
          <div class="hist-champ-info">
            <div class="hist-champ-name">${esc(p.name)}</div>
            <div class="hist-champ-sub">${esc(p.campus)} · ${p.titles} weekend title${p.titles !== 1 ? 's' : ''}</div>
          </div>
          <div class="hist-champ-wins">${p.wins}</div>
        </div>`).join('');

      const weeks = weekends.map(wk => {
        const top = wk.players[0];
        const runners = wk.players.slice(1, 3).map(p => esc(p.name)).join(', ');
        return `
          <div class="hist-weekend">
            <span class="hist-weekend-date">${fmtWeekend(wk.weekendStart)}</span>
            <span class="hist-weekend-winner">🏆 ${esc(top.name)}${runners ? ` <span style="color:var(--muted);font-weight:400;">· ${runners}</span>` : ''}</span>
            <span class="hist-weekend-wins">${top.wins}</span>
          </div>`;
      }).join('');

      panel.innerHTML = `
        <div class="hist-section-title">🏆 All-Time Champions</div>
        ${champs}
        <div class="hist-section-title" style="margin-top:6px;">📅 Past Weekends</div>
        <div>${weeks}</div>
      `;
    }

    async function doReset() {
      setMsg('Resetting…');
      try {
        const res = await fetch('/admin/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: adminPw })
        });
        const data = await res.json();
        if (data.ok) {
          isSuspended = false;
          updateSuspendBtn();
          $('history').classList.add('hidden'); // stale after reset — refetches on next open
          setMsg('✅ Scores reset! Everyone starts fresh.', 'success');
        } else {
          setMsg('❌ ' + (data.error || 'Failed'), 'error');
        }
      } catch {
        setMsg('❌ Could not connect to server.', 'error');
      }
    }
  </script>
</body>
</html>
