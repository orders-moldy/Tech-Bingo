<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0c0c1e">
  <title>TCC Tech Bingo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Join screen -->
  <div id="join-screen">
    <div class="join-box">
      <div class="join-mark">B</div>
      <h1>Welcome to<br>TCC Tech Bingo!</h1>
      <p>Enter your name and select your campus</p>
      <input id="name-input" type="text" placeholder="Your name" maxlength="20" autocomplete="off">
      <select id="campus-select">
        <option value="" disabled selected>Select your campus</option>
        <option>Plainfield</option>
        <option>Bolingbrook</option>
        <option>South Naperville</option>
        <option>Naperville</option>
        <option>Hinsdale</option>
        <option>Wheaton</option>
      </select>
      <button id="join-btn">Play</button>
      <p id="join-msg" class="join-msg"></p>
    </div>
  </div>

  <!-- Game screen -->
  <div id="game-screen" class="hidden">
    <header>
      <span class="logo" id="logo">TCC Tech Bingo</span>
      <span id="player-count"></span>
    </header>

    <div id="content">

      <div id="sb-title">🏆 Scoreboard</div>
      <div id="col-headers">
        <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
      </div>

      <div id="scoreboard">
        <div id="leaders"></div>
        <div id="score-list"></div>
        <div id="popular-box" class="hidden">
          <div class="popular-divider"></div>
          <div class="popular-title">🔥 Most Marked</div>
          <div id="popular-list"></div>
        </div>
      </div>
      <div id="card"></div>

      <div id="players-section">
        <div id="players-label">Playing now</div>
        <div id="players-list"></div>
      </div>

    </div>
  </div>

  <!-- Bingo win overlay -->
  <div id="win-overlay" class="hidden">
    <div class="win-box">
      <div class="win-emoji">🎉</div>
      <h2 id="win-message"></h2>
      <p id="countdown" class="countdown"></p>
    </div>
  </div>

  <!-- Admin-triggered stats overlay -->
  <div id="stats-overlay" class="hidden">
    <div class="stats-box">
      <div class="stats-header">📊 Weekend Stats</div>
      <div class="stats-columns">
        <div class="stats-col">
          <div class="stats-col-title">🏆 Leaderboard</div>
          <div id="stats-leaders"></div>
          <div id="stats-list"></div>
        </div>
        <div class="stats-divider"></div>
        <div class="stats-col">
          <div class="stats-col-title">🔥 Most Marked</div>
          <div id="stats-popular"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
