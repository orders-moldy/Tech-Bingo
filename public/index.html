<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#7FA2AD">
  <title>TCC Tech Bingo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Join screen -->
  <div id="join-screen">
    <div class="join-box">
      <div class="join-logo" aria-hidden="true">
        <svg viewBox="0 0 100 100" width="86" height="86" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="lg-card" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#ffffff"/>
              <stop offset="1" stop-color="#ECE6DF"/>
            </linearGradient>
            <linearGradient id="lg-stamp" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#a9c2ca"/>
              <stop offset="1" stop-color="#9BB6BF"/>
            </linearGradient>
          </defs>
          <g transform="rotate(-7 50 50)">
            <rect x="10" y="10" width="80" height="80" rx="14" fill="url(#lg-card)" stroke="rgba(127,160,171,0.55)" stroke-width="1.5"/>
            <!-- 3x3 mini grid -->
            <rect x="19" y="19" width="19" height="19" rx="5" fill="rgba(155,182,191,0.22)"/>
            <rect x="41" y="19" width="19" height="19" rx="5" fill="url(#lg-stamp)"/>
            <rect x="63" y="19" width="19" height="19" rx="5" fill="rgba(155,182,191,0.22)"/>
            <rect x="19" y="41" width="19" height="19" rx="5" fill="url(#lg-stamp)"/>
            <rect x="63" y="41" width="19" height="19" rx="5" fill="rgba(155,182,191,0.22)"/>
            <rect x="19" y="63" width="19" height="19" rx="5" fill="rgba(155,182,191,0.22)"/>
            <rect x="41" y="63" width="19" height="19" rx="5" fill="rgba(155,182,191,0.22)"/>
            <rect x="63" y="63" width="19" height="19" rx="5" fill="url(#lg-stamp)"/>
            <!-- star center -->
            <rect x="41" y="41" width="19" height="19" rx="5" fill="rgba(155,182,191,0.12)" stroke="rgba(127,160,171,0.7)" stroke-width="1.2" stroke-dasharray="3 2.4"/>
            <path d="M50.5 44.2 l1.9 3.9 4.3 .6 -3.1 3 .7 4.2 -3.8 -2 -3.8 2 .7 -4.2 -3.1 -3 4.3 -.6 z" fill="#7fa0ab"/>
          </g>
        </svg>
      </div>
      <h1>Welcome to<br>TCC Tech Bingo!</h1>
      <p>Enter your name and select your campus</p>
      <input id="name-input" type="text" placeholder="Your name" maxlength="20" autocomplete="off">
      <div class="dropdown" id="campus-dd">
        <button type="button" class="dropdown-btn" id="campus-btn">
          <span id="campus-label">Select your campus</span>
          <span class="dd-caret">▾</span>
        </button>
        <div class="dropdown-menu hidden" id="campus-menu"><!-- filled by client.js --></div>
      </div>
      <button id="join-btn">Play</button>
      <p id="join-msg" class="join-msg"></p>
    </div>
  </div>

  <!-- Game screen -->
  <div id="game-screen" class="hidden">
    <div id="content">

      <div id="logo-wrap"><span class="logo" id="logo">TCC Tech Bingo</span></div>
      <div id="col-headers">
        <div>B</div><div>I</div><div>N</div><div>G</div><div>O</div>
      </div>

      <div id="scoreboard">
        <div id="sb-title">🏆 Scoreboard</div>
        <div id="leaders"></div>
        <div id="score-list"></div>
        <div id="popular-box" class="hidden">
          <div class="popular-divider"></div>
          <div class="popular-title">🔥 Most Marked</div>
          <div id="popular-list"></div>
        </div>
        <div id="player-count"></div>
      </div>
      <div id="card"></div>

      <div id="players-section">
        <div id="players-label">Playing now</div>
        <div id="players-list"></div>
      </div>

      <div id="chat-section">
        <button id="chat-toggle" type="button">
          <span>💬 Chat</span>
          <span id="chat-unread" class="chat-unread hidden"></span>
          <span id="chat-caret" class="chat-caret">▸</span>
        </button>
        <div id="chat-body" class="hidden">
          <div id="chat-messages"></div>
          <button id="chat-pill" class="chat-pill hidden" type="button">↓ New messages</button>
          <div class="chat-input-row">
            <input id="chat-input" type="text" maxlength="200" placeholder="Message…" autocomplete="off">
            <button id="chat-send" type="button" title="Send" aria-label="Send message">➤</button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Bingo win overlay -->
  <div id="win-overlay" class="hidden">
    <div class="win-box">
      <div class="win-emoji">🎉</div>
      <h2 id="win-message"></h2>
      <p id="countdown" class="countdown"></p>
    </div>
  </div>

  <!-- Admin-triggered stats overlay -->
  <div id="stats-overlay" class="hidden">
    <div class="stats-box">
      <div class="stats-header">📊 Weekend Stats</div>
      <div class="stats-columns">
        <div class="stats-col">
          <div class="stats-col-title">🏆 Leaderboard</div>
          <div id="stats-leaders"></div>
          <div id="stats-list"></div>
        </div>
        <div class="stats-divider"></div>
        <div class="stats-col">
          <div class="stats-col-title">🔥 Most Marked</div>
          <div id="stats-popular"></div>
        </div>
      </div>
    </div>
  </div>

  <button id="theme-toggle" type="button" title="Switch color theme">◐</button>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
